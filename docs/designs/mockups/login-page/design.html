<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        color: #1f2937;
        background: #fff;
        line-height: 1.5;
      }
      /* Layout helper for full-page layouts. Grid + place-items avoids
         the flex centering trap where a child with max-width but no
         width collapses to min-content. The inner element gets
         width: 100% so the agent's max-width caps as expected. */
      .page-wrap {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 16px;
      }
      .page-wrap > * {
        width: 100%;
      }
    </style>
  </head>
  <body><style>
  body {
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(34,197,94,0.10), transparent 70%),
      #0a0f0d;
    color: #f0f4f1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .login-card {
    max-width: 420px;
    background: #141a17;
    border: 1px solid #1f2925;
    border-radius: 16px;
    box-shadow: 0 12px 24px -6px rgba(0,0,0,0.6);
    padding: 48px 40px 40px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    text-align: center;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
    box-shadow: 0 0 20px rgba(34,197,94,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #052e16;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .brand-name {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #f0f4f1;
  }
  .brand-sub {
    margin: 0;
    font-size: 15px;
    color: #9ba8a0;
    line-height: 1.4;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .ds-form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: inherit;
  }
  .ds-form-field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #9ba8a0;
    line-height: 1;
  }
  .ds-form-field-wrapper {
    position: relative;
    background: #0a0f0d;
    border: 1.5px solid #2d3a35;
    border-radius: 8px;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .ds-form-field-input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    background: transparent;
    border: none;
    outline: none;
    color: #f0f4f1;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.4;
  }
  .ds-form-field-input::placeholder { color: #5e6b64; }
  .ds-form-field-wrapper:focus-within {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.15), 0 0 20px rgba(34,197,94,0.4);
  }

  .label-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .link-accent {
    color: #4ade80;
    text-decoration: none;
    font-weight: 600;
    transition: color 120ms ease;
  }
  .link-accent:hover { color: #22c55e; text-decoration: underline; }
  .forgot-link {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .ds-btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 56px;
    margin-top: 4px;
    padding: 16px 28px;
    border: none;
    border-radius: 9999px;
    background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
    color: #052e16;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 8px -2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  .ds-btn-primary:hover { background: linear-gradient(180deg, #2dd472 0%, #16a34a 100%); }
  .ds-btn-primary:active {
    transform: scale(0.99);
    background: #16a34a;
    box-shadow: 0 0 20px rgba(34,197,94,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .ds-btn-primary:focus-visible { outline: 2px solid #d9f99d; outline-offset: 3px; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 20px;
    color: #5e6b64;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #1f2925;
  }

  .signup {
    margin: 0;
    text-align: center;
    font-size: 15px;
    color: #9ba8a0;
  }
</style>

<div class="page-wrap">
  <main class="login-card">
    <header class="brand">
      <span class="brand-mark" aria-hidden="true">E</span>
      <div>
        <h1 class="brand-name">EPM Journal</h1>
        <p class="brand-sub">Sign in to track your practice</p>
      </div>
    </header>

    <form class="login-form" action="#" method="post">
      <div class="ds-form-field">
        <label class="ds-form-field-label" for="email">Email</label>
        <div class="ds-form-field-wrapper">
          <input class="ds-form-field-input" id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="ds-form-field">
        <div class="label-row">
          <label class="ds-form-field-label" for="password">Password</label>
          <a class="link-accent forgot-link" href="#">Forgot password?</a>
        </div>
        <div class="ds-form-field-wrapper">
          <input class="ds-form-field-input" id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
      </div>

      <button class="ds-btn-primary" type="submit">
        <span class="ds-btn-label">Sign In</span>
      </button>
    </form>

    <div class="divider">New here?</div>

    <p class="signup">
      Don't have an account? <a class="link-accent" href="#">Create one</a>
    </p>
  </main>
</div></body>
</html>
