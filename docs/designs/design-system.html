<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Design System</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 2rem; color: #222; }
      h1, h2 { margin-top: 0; }
      h2 { margin-top: 2rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
      h3 { margin: 0 0 0.5rem; font-size: 1.05rem; }
      section[data-component] { margin-bottom: 2rem; }
      section[data-component] .example { padding: 1rem; border: 1px solid #ddd; border-radius: 4px; }
      .token { display: inline-flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0.5rem 0.25rem 0; }
      .token-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #ddd; }
      .token-bar { display: inline-block; height: 8px; background: #888; border-radius: 2px; }
      :root {
      }
    </style>
  </head>
  <body>
    <h1>Design System</h1>

    <h2>Tokens</h2>
    <section data-slot="tokens">
    </section>

    <h2>Components</h2>
    <section data-slot="components">
    </section>
  </body>
</html>
